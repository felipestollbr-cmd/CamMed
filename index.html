<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CamRégua">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<title>CamRégua</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap');

:root {
  --accent: #00ffb4;
  --btn-bg: rgba(0,0,0,0.6);
  --font-mono: 'Share Tech Mono', monospace;
  --font-ui: 'Exo 2', sans-serif;
  --ruler-h: 70px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  font-family: var(--font-ui);
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}

#app {
  position: fixed;
  inset: 0;
  background: #000;
}

#video {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}

/* grade desenhada via canvas absoluto sobre o vídeo */
#gridCanvas {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

#captureCanvas { display: none; }

/* ── BARRA SUPERIOR ── */
#topBar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  padding-top: env(safe-area-inset-top, 0px);
  background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, transparent 100%);
  z-index: 20;
}

.app-title {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 3px;
}

.top-controls { display: flex; gap: 10px; }

.icon-btn {
  background: var(--btn-bg);
  border: 1.5px solid rgba(0,255,180,0.35);
  color: var(--accent);
  border-radius: 50%;
  width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 18px;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}
.icon-btn.active { border-color: var(--accent); background: rgba(0,255,180,0.18); }
.icon-btn:active { background: rgba(0,255,180,0.25); }

/* ── BARRA INFERIOR ── */
#bottomBar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 20;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  background: transparent;
}

/* Régua */
#ruler {
  width: 100%;
  height: var(--ruler-h);
  background: rgba(8,8,8,0.92);
  border-top: 1.5px solid rgba(0,255,180,0.3);
  position: relative;
  overflow: hidden;
}

#rulerCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

/* Controles */
#controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 40px 14px;
  background: rgba(0,0,0,0.78);
}

/* Thumb da última foto */
#previewThumb {
  width: 54px; height: 54px;
  border-radius: 8px;
  border: 2px solid var(--accent);
  object-fit: cover;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  visibility: hidden;
}

/* Botão captura */
#captureBtn {
  width: 74px; height: 74px;
  border-radius: 50%;
  background: #fff;
  border: 4px solid var(--accent);
  outline: none;
  cursor: pointer;
  position: relative;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 0 0 5px rgba(0,255,180,0.18);
  flex-shrink: 0;
}
#captureBtn:active { transform: scale(0.91); }

/* Placeholder direita (equilíbrio visual) */
.ctrl-spacer {
  width: 54px; height: 54px;
}

/* Flash */
#flash {
  position: fixed; inset: 0;
  background: #fff;
  opacity: 0;
  pointer-events: none;
  z-index: 99;
  transition: opacity 0.06s;
}
#flash.on { opacity: 0.9; }

/* ── LIGHTBOX ── */
#lightbox {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.93);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 18px;
}
#lightbox.open { display: flex; }
#lbImg {
  max-width: 92vw;
  max-height: 68vh;
  border-radius: 8px;
  border: 1px solid rgba(0,255,180,0.3);
  object-fit: contain;
}
.lb-actions { display: flex; gap: 14px; }
.lb-btn {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 1.5px;
  padding: 11px 24px;
  border-radius: 6px;
  cursor: pointer;
  border: 1.5px solid var(--accent);
  background: transparent;
  color: var(--accent);
  -webkit-tap-highlight-color: transparent;
}
.lb-btn.primary { background: var(--accent); color: #000; font-weight: 600; }

/* Toast */
#toast {
  position: fixed;
  bottom: 140px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: rgba(0,255,180,0.13);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1.5px;
  padding: 8px 20px;
  border-radius: 20px;
  opacity: 0;
  transition: opacity 0.28s, transform 0.28s;
  pointer-events: none;
  z-index: 300;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Splash */
#splash {
  position: fixed; inset: 0;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
  z-index: 500;
  transition: opacity 0.5s;
}
#splash.gone { opacity: 0; pointer-events: none; }
.spl-title { font-family: var(--font-mono); color: var(--accent); font-size: 26px; letter-spacing: 6px; }
.spl-sub   { color: rgba(255,255,255,0.35); font-size: 12px; letter-spacing: 2px; }
.spl-bar   { width: 50px; height: 2px; background: rgba(0,255,180,0.18); border-radius: 2px; overflow: hidden; position: relative; }
.spl-bar::after { content:''; position:absolute; left:-50%; width:50%; height:100%; background:var(--accent); animation: sbar 0.9s infinite ease-in-out; }
@keyframes sbar { 0%{left:-50%} 100%{left:150%} }

/* Erro câmera */
#errMsg {
  position: fixed; inset: 0;
  background: #000;
  display: none;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 14px;
  color: rgba(255,255,255,0.5);
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 1px;
  text-align: center;
  padding: 30px;
  z-index: 400;
}
#errMsg.show { display: flex; }
#errMsg span { font-size: 44px; }
</style>
</head>
<body>

<div id="splash">
  <div class="spl-title">CAMRÉGUA</div>
  <div class="spl-sub">câmera · grade · régua</div>
  <div class="spl-bar"></div>
</div>

<div id="errMsg">
  <span>📷</span>
  <p>Sem acesso à câmera.<br>Verifique as permissões do navegador.</p>
</div>

<div id="flash"></div>

<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="gridCanvas"></canvas>
  <canvas id="captureCanvas"></canvas>

  <!-- Topo -->
  <div id="topBar">
    <div class="app-title">CAMRÉGUA</div>
    <div class="top-controls">
      <div class="icon-btn active" id="gridToggle" title="Grade">⊞</div>
      <div class="icon-btn" id="flipBtn" title="Virar câmera">🔄</div>
    </div>
  </div>

  <!-- Inferior -->
  <div id="bottomBar">
    <div id="ruler"><canvas id="rulerCanvas"></canvas></div>
    <div id="controls">
      <img id="previewThumb" alt="última foto" />
      <button id="captureBtn" aria-label="Tirar foto"></button>
      <div class="ctrl-spacer"></div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <img id="lbImg" src="" alt="foto capturada" />
  <div class="lb-actions">
    <button class="lb-btn" id="lbClose">FECHAR</button>
    <button class="lb-btn primary" id="lbSave">⬇ SALVAR</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════
const S = {
  stream: null,
  facing: 'environment',
  showGrid: true,
  lastPhoto: null,
  dpr: Math.min(window.devicePixelRatio || 1, 3),
  // Calibração DPI — será calculada em init()
  dpiX: 96,   // px/inch na tela física
  mmPerPx: 0, // mm por CSS pixel
};

// ═══════════════════════════════════════════
// ELEMENTOS
// ═══════════════════════════════════════════
const video        = document.getElementById('video');
const gridCanvas   = document.getElementById('gridCanvas');
const captureCanvas= document.getElementById('captureCanvas');
const rulerCanvas  = document.getElementById('rulerCanvas');
const gCtx         = gridCanvas.getContext('2d');
const cCtx         = captureCanvas.getContext('2d');
const rCtx         = rulerCanvas.getContext('2d');
const captureBtn   = document.getElementById('captureBtn');
const flipBtn      = document.getElementById('flipBtn');
const gridToggle   = document.getElementById('gridToggle');
const previewThumb = document.getElementById('previewThumb');
const flash        = document.getElementById('flash');
const lightbox     = document.getElementById('lightbox');
const lbImg        = document.getElementById('lbImg');
const lbClose      = document.getElementById('lbClose');
const lbSave       = document.getElementById('lbSave');
const toast        = document.getElementById('toast');
const splash       = document.getElementById('splash');
const errMsg       = document.getElementById('errMsg');
const ruler        = document.getElementById('ruler');

// ═══════════════════════════════════════════
// CALIBRAÇÃO DPI
// A régua precisa medir cm/mm reais.
// Usamos screen.width + window.innerWidth para
// estimar a densidade física de pixels.
// ═══════════════════════════════════════════
function calibrateDPI() {
  // Muitos celulares: screen.width em CSS px ≈ resolução lógica
  // DPR aproxima a densidade física
  // 1 inch = 25.4 mm
  // Estratégia: usar matchMedia para testar dpi real (funciona no Chrome Android/iOS Safari)
  const dpr = window.devicePixelRatio || 1;

  // Tenta obter DPI real via matchMedia
  let dpi = 96; // fallback padrão
  for (const d of [600,480,400,360,300,264,240,216,192,168,160,144,132,120,96,72]) {
    if (window.matchMedia(`(min-resolution: ${d}dpi)`).matches) {
      dpi = d;
      break;
    }
  }

  S.dpiX = dpi;
  // mm por CSS pixel = (1 inch / dpi) * 25.4 / DPR
  // Mas como CSS px é independente de DPR, basta: mm = 25.4 / dpi
  S.mmPerPx = 25.4 / dpi;

  console.log(`DPR=${dpr} DPI≈${dpi} mmPerPx=${S.mmPerPx.toFixed(4)}`);
}

// ═══════════════════════════════════════════
// CÂMERA
// ═══════════════════════════════════════════
async function startCamera() {
  if (S.stream) S.stream.getTracks().forEach(t => t.stop());
  try {
    S.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: S.facing, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = S.stream;
    await video.play();
    hideSplash();
  } catch(e) {
    console.error(e);
    hideSplash();
    errMsg.classList.add('show');
  }
}

function hideSplash() {
  splash.classList.add('gone');
  setTimeout(() => splash.style.display = 'none', 600);
}

// ═══════════════════════════════════════════
// RESIZE — recalcula canvases ao girar
// ═══════════════════════════════════════════
function resize() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const dpr = S.dpr;

  // Grid canvas cobre a tela inteira
  gridCanvas.width  = W * dpr;
  gridCanvas.height = H * dpr;
  gridCanvas.style.width  = W + 'px';
  gridCanvas.style.height = H + 'px';

  // Ruler canvas
  const rh = ruler.offsetHeight;
  const rw = ruler.offsetWidth;
  rulerCanvas.width  = rw * dpr;
  rulerCanvas.height = rh * dpr;
  rulerCanvas.style.width  = rw + 'px';
  rulerCanvas.style.height = rh + 'px';

  drawGrid();
  drawRuler();
}

// ═══════════════════════════════════════════
// GRADE (regra dos terços)
// ═══════════════════════════════════════════
function drawGrid() {
  const W = gridCanvas.width;
  const H = gridCanvas.height;
  const dpr = S.dpr;
  gCtx.clearRect(0, 0, W, H);
  if (!S.showGrid) return;

  gCtx.save();
  gCtx.strokeStyle = 'rgba(0,255,180,0.42)';
  gCtx.lineWidth = 1.2 * dpr;

  // Linhas verticais dos terços
  for (let i = 1; i <= 2; i++) {
    const x = (W / 3) * i;
    gCtx.beginPath(); gCtx.moveTo(x,0); gCtx.lineTo(x,H); gCtx.stroke();
  }
  // Linhas horizontais dos terços
  for (let i = 1; i <= 2; i++) {
    const y = (H / 3) * i;
    gCtx.beginPath(); gCtx.moveTo(0,y); gCtx.lineTo(W,y); gCtx.stroke();
  }

  // Pontos de intersecção
  gCtx.fillStyle = 'rgba(0,255,180,0.82)';
  const pts = [[W/3,H/3],[2*W/3,H/3],[W/3,2*H/3],[2*W/3,2*H/3]];
  for (const [px,py] of pts) {
    gCtx.beginPath(); gCtx.arc(px,py,4*dpr,0,Math.PI*2); gCtx.fill();
  }

  // Cruz central
  const cs = 18*dpr;
  const cx = W/2, cy = H/2;
  gCtx.strokeStyle = 'rgba(0,255,180,0.72)';
  gCtx.lineWidth = 1.5*dpr;
  gCtx.beginPath();
  gCtx.moveTo(cx-cs,cy); gCtx.lineTo(cx+cs,cy);
  gCtx.moveTo(cx,cy-cs); gCtx.lineTo(cx,cy+cs);
  gCtx.stroke();

  gCtx.restore();
}

// ═══════════════════════════════════════════
// RÉGUA REAL em cm/mm
// Idêntica à imagem enviada:
//  - ticks crescem de cima para baixo
//  - traço grande = cm (com número abaixo)
//  - traço médio  = 0.5 cm
//  - traço pequeno = mm
//  - número fica na parte INFERIOR do traço cm
// ═══════════════════════════════════════════
function drawRuler() {
  const W   = rulerCanvas.width;
  const H   = rulerCanvas.height;
  const dpr = S.dpr;
  rCtx.clearRect(0, 0, W, H);

  // px por mm no canvas (já multiplicado pelo DPR)
  const pxPerMm = (S.dpiX / 25.4) * dpr;
  const pxPerCm = pxPerMm * 10;

  rCtx.save();

  // Linha topo da régua (base dos traços)
  const baseY = 1 * dpr;
  rCtx.strokeStyle = '#00ffb4';
  rCtx.lineWidth   = 1 * dpr;
  rCtx.beginPath(); rCtx.moveTo(0, baseY); rCtx.lineTo(W, baseY); rCtx.stroke();

  // Alturas dos traços (em pixels do canvas)
  const tickCm   = H * 0.72;  // traço de cm — alto
  const tickHalf = H * 0.48;  // traço de meio cm
  const tickMm   = H * 0.28;  // traço de mm

  // Fonte para os números
  const fontSize = Math.round(10 * dpr);
  rCtx.font      = `${fontSize}px 'Share Tech Mono', monospace`;
  rCtx.fillStyle = '#00ffb4';
  rCtx.textAlign = 'center';

  const totalMm = Math.ceil(W / pxPerMm) + 2;

  for (let mm = 0; mm <= totalMm; mm++) {
    const x = mm * pxPerMm;
    if (x > W + 1) break;

    let tH;
    if (mm % 10 === 0) {
      // traço de centímetro
      tH = tickCm;
      const cm = mm / 10;
      // número embaixo do traço (como na régua real)
      rCtx.fillText(String(cm), x, H - 2*dpr);
    } else if (mm % 5 === 0) {
      tH = tickHalf;
    } else {
      tH = tickMm;
    }

    rCtx.beginPath();
    rCtx.moveTo(x, baseY);
    rCtx.lineTo(x, baseY + tH);
    rCtx.stroke();
  }

  rCtx.restore();
}

// ═══════════════════════════════════════════
// CAPTURA — grava grade + régua na foto
// ═══════════════════════════════════════════
async function capturePhoto() {
  // Dimensão real do frame de vídeo
  const vw = video.videoWidth  || window.innerWidth;
  const vh = video.videoHeight || window.innerHeight;

  // Proporção CSS→vídeo
  const ratioW = vw / window.innerWidth;
  const ratioH = vh / window.innerHeight;

  // Altura da régua em pixels de vídeo
  const rulerCssPx = ruler.offsetHeight;
  const rulerVpx   = rulerCssPx * ratioH;

  captureCanvas.width  = vw;
  captureCanvas.height = vh;

  // 1) Frame da câmera
  cCtx.drawImage(video, 0, 0, vw, vh);

  // 2) Grade
  if (S.showGrid) {
    cCtx.save();
    cCtx.strokeStyle = 'rgba(0,255,180,0.48)';
    cCtx.lineWidth   = Math.max(1, 1.5 * ratioW);

    for (let i = 1; i <= 2; i++) {
      cCtx.beginPath(); cCtx.moveTo(vw/3*i,0); cCtx.lineTo(vw/3*i,vh); cCtx.stroke();
      cCtx.beginPath(); cCtx.moveTo(0,vh/3*i); cCtx.lineTo(vw,vh/3*i); cCtx.stroke();
    }

    cCtx.fillStyle = 'rgba(0,255,180,0.85)';
    for (const [px,py] of [[vw/3,vh/3],[2*vw/3,vh/3],[vw/3,2*vh/3],[2*vw/3,2*vh/3]]) {
      cCtx.beginPath(); cCtx.arc(px,py,5*ratioW,0,Math.PI*2); cCtx.fill();
    }

    const cs = 20*ratioW;
    cCtx.strokeStyle = 'rgba(0,255,180,0.72)';
    cCtx.beginPath();
    cCtx.moveTo(vw/2-cs,vh/2); cCtx.lineTo(vw/2+cs,vh/2);
    cCtx.moveTo(vw/2,vh/2-cs); cCtx.lineTo(vw/2,vh/2+cs);
    cCtx.stroke();
    cCtx.restore();
  }

  // 3) Régua na parte inferior
  drawRulerOnCapture(cCtx, vw, vh, rulerVpx, ratioW);

  return captureCanvas.toDataURL('image/jpeg', 0.95);
}

function drawRulerOnCapture(ctx, vw, vh, rulerH, ratioW) {
  // Fundo
  ctx.save();
  ctx.fillStyle = 'rgba(8,8,8,0.92)';
  ctx.fillRect(0, vh - rulerH, vw, rulerH);

  // Borda topo
  ctx.strokeStyle = 'rgba(0,255,180,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,vh-rulerH); ctx.lineTo(vw,vh-rulerH); ctx.stroke();

  // Escala em pixels de vídeo (DPI real calibrado)
  const pxPerMm = (S.dpiX / 25.4) * ratioW;
  const totalMm = Math.ceil(vw / pxPerMm) + 2;

  const baseY    = vh - rulerH + 1;
  const tickCm   = rulerH * 0.72;
  const tickHalf = rulerH * 0.48;
  const tickMm   = rulerH * 0.28;

  const fontSize = Math.round(Math.max(8, 10 * ratioW));
  ctx.font      = `${fontSize}px monospace`;
  ctx.fillStyle = '#00ffb4';
  ctx.strokeStyle = '#00ffb4';
  ctx.lineWidth = Math.max(1, ratioW);
  ctx.textAlign = 'center';

  ctx.beginPath(); ctx.moveTo(0,baseY); ctx.lineTo(vw,baseY); ctx.stroke();

  for (let mm = 0; mm <= totalMm; mm++) {
    const x = mm * pxPerMm;
    if (x > vw + 1) break;
    let tH;
    if (mm % 10 === 0) {
      tH = tickCm;
      ctx.fillText(String(mm/10), x, vh - 2*ratioW);
    } else if (mm % 5 === 0) {
      tH = tickHalf;
    } else {
      tH = tickMm;
    }
    ctx.beginPath(); ctx.moveTo(x,baseY); ctx.lineTo(x,baseY+tH); ctx.stroke();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════
// EVENTOS
// ═══════════════════════════════════════════

// Botão captura — usa touchend para iOS PWA (evita bug de click bloqueado)
function doCapture(e) {
  e.preventDefault();
  e.stopPropagation();

  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 130);

  capturePhoto().then(dataUrl => {
    S.lastPhoto = dataUrl;
    previewThumb.src = dataUrl;
    previewThumb.style.visibility = 'visible';
    showToast('✓ FOTO CAPTURADA');
  }).catch(err => {
    console.error('Capture error:', err);
    showToast('Erro ao capturar');
  });
}

captureBtn.addEventListener('touchend', doCapture, { passive: false });
captureBtn.addEventListener('click', doCapture);

flipBtn.addEventListener('click', () => {
  S.facing = S.facing === 'environment' ? 'user' : 'environment';
  startCamera();
});

gridToggle.addEventListener('click', () => {
  S.showGrid = !S.showGrid;
  gridToggle.classList.toggle('active', S.showGrid);
  drawGrid();
});

previewThumb.addEventListener('click', openLightbox);
lbClose.addEventListener('click', () => lightbox.classList.remove('open'));
lbSave.addEventListener('click', savePhoto);

// ═══════════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════════
function openLightbox() {
  if (!S.lastPhoto) return;
  lbImg.src = S.lastPhoto;
  lightbox.classList.add('open');
}

// ═══════════════════════════════════════════
// SALVAR
// ═══════════════════════════════════════════
async function savePhoto() {
  if (!S.lastPhoto) return;
  const filename = `camregua_${Date.now()}.jpg`;

  // Web Share (mobile nativo)
  if (navigator.share && navigator.canShare) {
    try {
      const blob = await (await fetch(S.lastPhoto)).blob();
      const file = new File([blob], filename, { type: 'image/jpeg' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'CamRégua' });
        showToast('✓ COMPARTILHADO');
        return;
      }
    } catch(e) { /* fallback */ }
  }

  // Download direto
  const a = document.createElement('a');
  a.href = S.lastPhoto;
  a.download = filename;
  a.click();
  showToast('✓ DOWNLOAD INICIADO');
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
let _toastT;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove('show'), 2400);
}

// ═══════════════════════════════════════════
// LOOP DE ANIMAÇÃO DA GRADE
// ═══════════════════════════════════════════
function loop() {
  drawGrid();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════
// ORIENTAÇÃO — recalcula tudo ao girar
// ═══════════════════════════════════════════
function handleOrientationChange() {
  // Aguarda o browser concluir a mudança de layout
  setTimeout(() => {
    resize();
  }, 350);
}

window.addEventListener('resize', resize);
window.addEventListener('orientationchange', handleOrientationChange);

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
calibrateDPI();
resize();
startCamera();
loop();

// Service Worker (PWA offline)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(console.warn);
  });
}
</script>
