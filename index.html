<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CamMed - Câmera Profissional</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: -apple-system, 'Segoe UI', 'Roboto', sans-serif;
    }

    .app-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
    }

    .canvas-wrapper {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: crosshair;
    }

    /* Barra inferior estilo iPhone com dois botões */
    .control-bar {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 30px 30px;
      border-top: 0.5px solid rgba(255,255,255,0.2);
      gap: 20px;
    }

    /* Botão de captura de foto (centralizado, maior) */
    .capture-btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: white;
      border: none;
      outline: none;
      cursor: pointer;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.3), 0 0 0 8px rgba(0,255,180,0.2);
      transition: transform 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .capture-btn:active {
      transform: scale(0.94);
    }
    .capture-btn .inner-dot {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #ff3366;
    }
    .capture-btn:active .inner-dot {
      background: #cc0044;
    }

    /* Botão de vídeo / instalação */
    .action-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 40px;
      padding: 12px 20px;
      color: white;
      font-size: 16px;
      font-weight: 500;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .action-btn:active {
      background: rgba(255,255,255,0.4);
      transform: scale(0.96);
    }
    .action-btn.recording {
      background: #ff3b30;
      color: white;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 1; }
    }
    .install-btn {
      background: #34c759;
    }
    .info {
      position: absolute;
      bottom: 100px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      font-weight: 500;
      background: rgba(0,0,0,0.4);
      padding: 4px 8px;
      width: fit-content;
      margin: 0 auto;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      pointer-events: none;
      z-index: 10;
    }
    .toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #0f0;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 14px;
      z-index: 1000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    @media (max-width: 600px) {
      .action-btn { padding: 8px 16px; font-size: 14px; }
      .control-bar { padding: 12px 20px 25px; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="canvas-wrapper">
    <canvas id="mainCanvas"></canvas>
  </div>
  <div class="control-bar">
    <button id="videoBtn" class="action-btn">🎥 Iniciar Vídeo</button>
    <button class="capture-btn" id="captureBtn">
      <div class="inner-dot"></div>
    </button>
    <button id="installBtn" class="action-btn install-btn" style="display: none;">📲 Instalar</button>
  </div>
  <div class="info">📷 Foto • 🎥 Vídeo com grade/régua • Toque no centro para foto</div>
</div>
<div id="toast" class="toast">📸 Foto capturada!</div>

<script>
  (function() {
    // --- Elementos ---
    const video = document.createElement('video');
    video.setAttribute('autoplay', '');
    video.setAttribute('playsinline', '');
    video.style.display = 'none';
    document.body.appendChild(video);

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let animationId = null;

    // --- Configurações da régua e grade ---
    const PX_PER_CM = 30;
    const PX_PER_MM = PX_PER_CM / 10;
    const RULER_HEIGHT = 60;
    const GRID_COLOR = `rgba(255, 255, 255, 0.65)`;
    const LINE_WIDTH = 1.2;
    const FOCUS_CIRCLE_RADIUS = 60;
    const SCALE_Y_POS = 40;
    const SCALE_VALUES = [-3, -2, -1, 0, 1, 2, 3];

    // --- Variáveis de gravação de vídeo ---
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;
    let canvasStream = null;

    // --- Inicializar câmera (traseira) ---
    let currentStream = null;

    async function initCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
      }
      try {
        let constraints = {
          video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } }
        };
        let stream = await navigator.mediaDevices.getUserMedia(constraints);
        currentStream = stream;
        video.srcObject = stream;
        await video.play();
        resizeCanvasAndDraw();
        startDrawLoop();
        return true;
      } catch (err) {
        console.warn("Câmera traseira falhou, tentando qualquer câmera", err);
        try {
          let stream = await navigator.mediaDevices.getUserMedia({ video: true });
          currentStream = stream;
          video.srcObject = stream;
          await video.play();
          resizeCanvasAndDraw();
          startDrawLoop();
          return true;
        } catch(e) {
          console.error("Erro fatal na câmera", e);
          document.querySelector('.info').innerHTML = "❌ Sem acesso à câmera. Verifique permissões.";
          return false;
        }
      }
    }

    function resizeCanvasAndDraw() {
      if (!video.videoWidth || !video.videoHeight) return;
      const container = canvas.parentElement;
      const containerWidth = container.clientWidth;
      const containerHeight = container.clientHeight;
      const videoAspect = video.videoWidth / video.videoHeight;
      let canvasWidth = containerWidth;
      let canvasHeight = canvasWidth / videoAspect;
      if (canvasHeight > containerHeight) {
        canvasHeight = containerHeight;
        canvasWidth = canvasHeight * videoAspect;
      }
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;
      canvas.style.width = `${canvasWidth}px`;
      canvas.style.height = `${canvasHeight}px`;
      canvas.style.left = `${(containerWidth - canvasWidth)/2}px`;
      canvas.style.top = `${(containerHeight - canvasHeight)/2}px`;
      if (video.readyState >= 2) drawFrame();
    }

    window.addEventListener('resize', () => resizeCanvasAndDraw());
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvasAndDraw, 50));

    function drawFrame() {
      if (!video.videoWidth || !canvas.width) return;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      drawProfessionalGrid();
      drawRuler();
    }

    function drawProfessionalGrid() {
      const w = canvas.width;
      const h = canvas.height;
      ctx.save();
      ctx.strokeStyle = GRID_COLOR;
      ctx.lineWidth = LINE_WIDTH;
      const x1 = w / 3, x2 = 2 * w / 3;
      const y1 = h / 3, y2 = 2 * h / 3;
      ctx.beginPath(); ctx.moveTo(x1, 0); ctx.lineTo(x1, h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x2, 0); ctx.lineTo(x2, h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, y1); ctx.lineTo(w, y1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, y2); ctx.lineTo(w, y2); ctx.stroke();

      const cx = w/2, cy = h/2;
      ctx.beginPath(); ctx.arc(cx, cy, FOCUS_CIRCLE_RADIUS, 0, 2*Math.PI); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx-8, cy); ctx.lineTo(cx+8, cy); ctx.moveTo(cx, cy-8); ctx.lineTo(cx, cy+8); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, cy, FOCUS_CIRCLE_RADIUS*0.4, 0, 2*Math.PI); ctx.stroke();

      const scaleWidth = 180;
      const startX = (w/2) - (scaleWidth/2);
      const scaleY = SCALE_Y_POS;
      const tickSpacing = scaleWidth / (SCALE_VALUES.length-1);
      ctx.beginPath(); ctx.moveTo(startX, scaleY); ctx.lineTo(startX+scaleWidth, scaleY); ctx.stroke();
      ctx.font = "12px 'Courier New'";
      ctx.fillStyle = GRID_COLOR;
      ctx.textAlign = "center";
      for (let i=0; i<SCALE_VALUES.length; i++) {
        const xTick = startX + i*tickSpacing;
        ctx.beginPath(); ctx.moveTo(xTick, scaleY-5); ctx.lineTo(xTick, scaleY+5); ctx.stroke();
        let label = SCALE_VALUES[i];
        if (label > 0) label = "+"+label;
        ctx.fillText(label, xTick, scaleY-8);
      }
      ctx.beginPath(); ctx.moveTo(w/2, scaleY-10); ctx.lineTo(w/2-4, scaleY-2); ctx.lineTo(w/2+4, scaleY-2); ctx.fillStyle = `rgba(255,200,100,0.9)`; ctx.fill();

      [[x1,y1],[x1,y2],[x2,y1],[x2,y2]].forEach(([cx,cy]) => {
        ctx.beginPath(); ctx.rect(cx-12, cy-8, 24, 16); ctx.stroke();
        ctx.beginPath(); ctx.rect(cx-8, cy-12, 16, 24); ctx.stroke();
      });
      ctx.restore();
    }

    function drawRuler() {
      const w = canvas.width;
      const rulerY = canvas.height - RULER_HEIGHT;
      ctx.fillStyle = "rgba(255, 248, 225, 0.85)";
      ctx.fillRect(0, rulerY, w, RULER_HEIGHT);
      ctx.strokeStyle = "#aaa";
      ctx.beginPath(); ctx.moveTo(0, rulerY); ctx.lineTo(w, rulerY); ctx.stroke();

      const totalMM = Math.floor(w / PX_PER_MM);
      ctx.fillStyle = "#222";
      ctx.font = "11px 'Courier New'";
      ctx.strokeStyle = "#222";
      for (let mm = 0; mm <= totalMM; mm++) {
        const x = mm * PX_PER_MM;
        if (x > w) break;
        const isCm = (mm % 10 === 0);
        const is5mm = (mm % 5 === 0 && !isCm);
        let tickHeight = 8;
        if (is5mm) tickHeight = 14;
        if (isCm) tickHeight = 22;
        ctx.beginPath(); ctx.moveTo(x, rulerY+RULER_HEIGHT-2); ctx.lineTo(x, rulerY+RULER_HEIGHT-tickHeight); ctx.stroke();
        if (isCm) {
          let label = mm/10 === 0 ? "0" : (mm/10 === 1 ? "1cm" : (mm/10).toString());
          ctx.fillStyle = "#111";
          ctx.font = "bold 11px 'Segoe UI'";
          const tw = ctx.measureText(label).width;
          let tx = x - tw/2;
          if (tx < 2) tx = 2;
          if (tx+tw > w-5) tx = w-tw-2;
          ctx.fillText(label, tx, rulerY+RULER_HEIGHT-tickHeight-3);
        }
      }
      ctx.font = "italic 9px 'Segoe UI'";
      ctx.fillStyle = "#3c3c3c";
      const tilibra = "tilibra";
      const tw = ctx.measureText(tilibra).width;
      ctx.fillText(tilibra, w - tw - 12, rulerY+RULER_HEIGHT-8);
      ctx.font = "8px monospace";
      ctx.fillStyle = "#5a5a5a";
      ctx.fillText("mm", 6, rulerY+RULER_HEIGHT-6);
      ctx.fillStyle = "#222";
      ctx.fillText("cm", 6, rulerY+14);
      ctx.beginPath(); ctx.moveTo(0, rulerY+RULER_HEIGHT-2); ctx.lineTo(3, rulerY+RULER_HEIGHT-10);
      ctx.moveTo(w-1, rulerY+RULER_HEIGHT-2); ctx.lineTo(w-4, rulerY+RULER_HEIGHT-10); ctx.stroke();
    }

    function startDrawLoop() {
      if (animationId) cancelAnimationFrame(animationId);
      function frame() {
        if (video.readyState >= 2) drawFrame();
        animationId = requestAnimationFrame(frame);
      }
      frame();
    }

    // --- Captura de foto (igual antes) ---
    async function capturePhoto() {
      drawFrame();
      canvas.toBlob(async (blob) => {
        if (!blob) { showToast("Erro ao gerar imagem"); return; }
        const file = new File([blob], `camed_${Date.now()}.png`, { type: 'image/png' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ title: 'CamMed', files: [file] });
            showToast("✅ Foto salva no rolo (escolha Salvar)");
          } catch(e) { if(e.name !== 'AbortError') downloadFallback(blob); }
        } else { downloadFallback(blob); }
      }, 'image/png');
    }

    function downloadFallback(blob) {
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.download = `camed_${Date.now()}.png`;
      link.click();
      URL.revokeObjectURL(url);
      showToast("📁 Imagem baixada");
    }

    // --- Gravação de vídeo (captura do canvas) ---
    async function startRecording() {
      if (isRecording) return;
      // Cria um stream a partir do canvas (captura o canvas a cada frame)
      const fps = 30;
      canvasStream = canvas.captureStream(fps);
      // Opcional: adicionar áudio do microfone? (se precisar, descomentar)
      // try { const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true }); audioStream.getTracks().forEach(track => canvasStream.addTrack(track)); } catch(e) {}
      mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
      recordedChunks = [];
      mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) recordedChunks.push(event.data);
      };
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `camed_video_${Date.now()}.webm`;
        a.click();
        URL.revokeObjectURL(url);
        showToast("🎥 Vídeo salvo (verifique Downloads)");
        recordedChunks = [];
        if (canvasStream) canvasStream.getTracks().forEach(t => t.stop());
        canvasStream = null;
        document.getElementById('videoBtn').classList.remove('recording');
        document.getElementById('videoBtn').innerHTML = '🎥 Iniciar Vídeo';
        isRecording = false;
      };
      mediaRecorder.start(1000); // captura a cada segundo
      isRecording = true;
      document.getElementById('videoBtn').classList.add('recording');
      document.getElementById('videoBtn').innerHTML = '⏹️ Parar Gravação';
      showToast("🔴 Gravando vídeo com grade e régua...");
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
      }
    }

    function toggleRecording() {
      if (isRecording) stopRecording();
      else startRecording();
    }

    // --- Instalação do PWA ---
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const installBtn = document.getElementById('installBtn');
      installBtn.style.display = 'flex';
      installBtn.onclick = async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            installBtn.style.display = 'none';
          }
          deferredPrompt = null;
        }
      };
    });

    // --- Eventos UI ---
    document.getElementById('captureBtn').addEventListener('click', capturePhoto);
    document.getElementById('videoBtn').addEventListener('click', toggleRecording);

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.opacity = '1';
      setTimeout(() => toast.style.opacity = '0', 2000);
    }

    // Inicializar
    initCamera();
  })();
</script>
</body>
</html>
