<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CamMed - Câmera Profissional</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, 'Segoe UI', 'Roboto', sans-serif;
    }
    .app-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
    }
    .canvas-wrapper {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;  /* mantém proporção em portrait */
      cursor: crosshair;
      background: #000;
    }

    /* Modo paisagem: ocupar toda a tela sem barras */
    @media (orientation: landscape) {
      canvas {
        object-fit: fill;  /* estica para preencher totalmente */
      }
    }

    .mode-selector {
      position: absolute;
      top: 40px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(20px);
      padding: 8px 16px;
      border-radius: 40px;
      width: fit-content;
      margin: 0 auto;
      z-index: 20;
    }
    .mode-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 16px;
      font-weight: 600;
      padding: 6px 20px;
      border-radius: 30px;
      transition: 0.2s;
      cursor: pointer;
    }
    .mode-btn.active {
      background: rgba(255,255,255,0.3);
      color: white;
    }
    .control-bar {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 0 30px;
      border-top: 0.5px solid rgba(255,255,255,0.2);
      position: relative;
      z-index: 10;
    }
    .capture-btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: white;
      border: none;
      outline: none;
      cursor: pointer;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.3), 0 0 0 8px rgba(0,255,180,0.2);
      transition: transform 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: -20px;
    }
    .capture-btn:active { transform: scale(0.94); }
    .capture-btn .inner-dot {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #ff3366;
      transition: 0.1s;
    }
    .capture-btn.video-mode .inner-dot {
      background: #ff3b30;
    }
    .capture-btn.recording .inner-dot {
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
    .install-btn {
      position: absolute;
      right: 20px;
      bottom: 20px;
      background: #34c759;
      border: none;
      border-radius: 30px;
      padding: 8px 16px;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      z-index: 20;
      display: none;
    }
    .info {
      position: absolute;
      bottom: 100px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      background: rgba(0,0,0,0.4);
      padding: 4px 8px;
      width: fit-content;
      margin: 0 auto;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      pointer-events: none;
      z-index: 5;
    }
    .toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #0f0;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 14px;
      z-index: 1000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="canvas-wrapper">
    <canvas id="mainCanvas"></canvas>
  </div>
  <div class="mode-selector">
    <button id="photoModeBtn" class="mode-btn active">📷 Foto</button>
    <button id="videoModeBtn" class="mode-btn">🎥 Vídeo</button>
  </div>
  <div class="control-bar">
    <button class="capture-btn" id="captureBtn">
      <div class="inner-dot"></div>
    </button>
  </div>
  <div class="info" id="infoMsg">📷 Modo Foto • Toque para capturar</div>
  <button id="installBtn" class="install-btn">📲 Instalar</button>
</div>
<div id="toast" class="toast">✅ Pronto!</div>

<script>
  (function() {
    // --- Elementos ---
    const videoElem = document.createElement('video');
    videoElem.setAttribute('autoplay', '');
    videoElem.setAttribute('playsinline', '');
    videoElem.style.display = 'none';
    document.body.appendChild(videoElem);

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let animationId = null;

    // --- Configurações visuais ---
    const PX_PER_CM = 30;
    const PX_PER_MM = PX_PER_CM / 10;
    const RULER_HEIGHT = 60;
    const GRID_COLOR = `rgba(255, 255, 255, 0.65)`;
    const LINE_WIDTH = 1.2;
    const FOCUS_CIRCLE_RADIUS = 60;
    const SCALE_Y_POS = 40;
    const SCALE_VALUES = [-3, -2, -1, 0, 1, 2, 3];

    // --- Estado do app ---
    let currentMode = 'photo'; // 'photo' ou 'video'
    let isRecording = false;
    let mediaRecorder = null;
    let recordedChunks = [];
    let canvasStream = null;
    let currentStream = null;

    // --- Inicializar câmera (traseira) ---
    async function initCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
      }
      try {
        // Tenta câmera traseira com alta resolução
        let constraints = {
          video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } }
        };
        let stream = await navigator.mediaDevices.getUserMedia(constraints);
        currentStream = stream;
        videoElem.srcObject = stream;
        await videoElem.play();
        resizeCanvasAndDraw();
        startDrawLoop();
        return true;
      } catch (err) {
        console.warn("Câmera traseira falhou, tentando qualquer câmera", err);
        try {
          let stream = await navigator.mediaDevices.getUserMedia({ video: true });
          currentStream = stream;
          videoElem.srcObject = stream;
          await videoElem.play();
          resizeCanvasAndDraw();
          startDrawLoop();
          return true;
        } catch(e) {
          console.error("Erro fatal na câmera", e);
          document.getElementById('infoMsg').innerHTML = "❌ Sem acesso à câmera.";
          return false;
        }
      }
    }

    // --- Ajuste do canvas para preencher a tela (landscape = fill, portrait = contain) ---
    function resizeCanvasAndDraw() {
      if (!videoElem.videoWidth || !videoElem.videoHeight) return;
      const container = canvas.parentElement;
      const containerWidth = container.clientWidth;
      const containerHeight = container.clientHeight;
      const videoAspect = videoElem.videoWidth / videoElem.videoHeight;
      
      let canvasWidth, canvasHeight;
      // Se for landscape (largura > altura), preencher totalmente (object-fit: fill)
      // Mas com canvas, aplicamos as dimensões para ocupar 100% do container.
      canvasWidth = containerWidth;
      canvasHeight = containerHeight;
      
      // Para manter a proporção em portrait, usamos object-fit: contain via CSS.
      // Para landscape, queremos fill, então definimos as dimensões exatas do container.
      // O canvas será desenhado com essas dimensões, e a imagem do vídeo será esticada para preencher.
      // Isso faz com que a grade e régua também se ajustem.
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;
      canvas.style.width = canvasWidth + 'px';
      canvas.style.height = canvasHeight + 'px';
      canvas.style.left = '0';
      canvas.style.top = '0';
      
      // Se estiver em portrait, manter a proporção com fundo preto (object-fit: contain)
      // Para landscape, preencher (object-fit: fill) - já definido via CSS.
      // Agora desenhamos o frame imediatamente.
      if (videoElem.readyState >= 2) drawFrame();
    }

    // Atualiza quando a orientação mudar
    window.addEventListener('resize', () => {
      resizeCanvasAndDraw();
    });
    window.addEventListener('orientationchange', () => {
      setTimeout(resizeCanvasAndDraw, 50);
    });

    // --- Desenho do frame (vídeo + grade + régua) ---
    function drawFrame() {
      if (!videoElem.videoWidth || !canvas.width) return;
      // Desenha o vídeo esticado para preencher o canvas (já que o canvas tem o tamanho do container)
      ctx.drawImage(videoElem, 0, 0, canvas.width, canvas.height);
      drawProfessionalGrid();
      drawRuler();
    }

    function drawProfessionalGrid() {
      const w = canvas.width, h = canvas.height;
      ctx.save();
      ctx.strokeStyle = GRID_COLOR;
      ctx.lineWidth = LINE_WIDTH;
      const x1 = w/3, x2 = 2*w/3, y1 = h/3, y2 = 2*h/3;
      ctx.beginPath(); ctx.moveTo(x1,0); ctx.lineTo(x1,h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x2,0); ctx.lineTo(x2,h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,y1); ctx.lineTo(w,y1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,y2); ctx.lineTo(w,y2); ctx.stroke();
      const cx = w/2, cy = h/2;
      ctx.beginPath(); ctx.arc(cx, cy, FOCUS_CIRCLE_RADIUS, 0, 2*Math.PI); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx-8,cy); ctx.lineTo(cx+8,cy); ctx.moveTo(cx,cy-8); ctx.lineTo(cx,cy+8); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, cy, FOCUS_CIRCLE_RADIUS*0.4, 0, 2*Math.PI); ctx.stroke();
      const scaleWidth = 180, startX = w/2 - scaleWidth/2, scaleY = SCALE_Y_POS;
      const tickSpacing = scaleWidth / (SCALE_VALUES.length-1);
      ctx.beginPath(); ctx.moveTo(startX, scaleY); ctx.lineTo(startX+scaleWidth, scaleY); ctx.stroke();
      ctx.font = "12px 'Courier New'";
      ctx.fillStyle = GRID_COLOR;
      ctx.textAlign = "center";
      for (let i=0; i<SCALE_VALUES.length; i++) {
        const xTick = startX + i*tickSpacing;
        ctx.beginPath(); ctx.moveTo(xTick, scaleY-5); ctx.lineTo(xTick, scaleY+5); ctx.stroke();
        let label = SCALE_VALUES[i];
        if (label > 0) label = "+"+label;
        ctx.fillText(label, xTick, scaleY-8);
      }
      ctx.beginPath(); ctx.moveTo(w/2, scaleY-10); ctx.lineTo(w/2-4, scaleY-2); ctx.lineTo(w/2+4, scaleY-2); ctx.fillStyle = `rgba(255,200,100,0.9)`; ctx.fill();
      [[x1,y1],[x1,y2],[x2,y1],[x2,y2]].forEach(([cx,cy]) => {
        ctx.beginPath(); ctx.rect(cx-12, cy-8, 24, 16); ctx.stroke();
        ctx.beginPath(); ctx.rect(cx-8, cy-12, 16, 24); ctx.stroke();
      });
      ctx.restore();
    }

    function drawRuler() {
      const w = canvas.width;
      const rulerY = canvas.height - RULER_HEIGHT;
      ctx.fillStyle = "rgba(255, 248, 225, 0.85)";
      ctx.fillRect(0, rulerY, w, RULER_HEIGHT);
      ctx.strokeStyle = "#aaa";
      ctx.beginPath(); ctx.moveTo(0, rulerY); ctx.lineTo(w, rulerY); ctx.stroke();
      const totalMM = Math.floor(w / PX_PER_MM);
      ctx.fillStyle = "#222";
      ctx.font = "11px 'Courier New'";
      ctx.strokeStyle = "#222";
      for (let mm = 0; mm <= totalMM; mm++) {
        const x = mm * PX_PER_MM;
        if (x > w) break;
        const isCm = (mm % 10 === 0);
        const is5mm = (mm % 5 === 0 && !isCm);
        let tickHeight = 8;
        if (is5mm) tickHeight = 14;
        if (isCm) tickHeight = 22;
        ctx.beginPath(); ctx.moveTo(x, rulerY+RULER_HEIGHT-2); ctx.lineTo(x, rulerY+RULER_HEIGHT-tickHeight); ctx.stroke();
        if (isCm) {
          let label = mm/10 === 0 ? "0" : (mm/10 === 1 ? "1cm" : (mm/10).toString());
          ctx.fillStyle = "#111";
          ctx.font = "bold 11px 'Segoe UI'";
          const tw = ctx.measureText(label).width;
          let tx = x - tw/2;
          if (tx < 2) tx = 2;
          if (tx+tw > w-5) tx = w-tw-2;
          ctx.fillText(label, tx, rulerY+RULER_HEIGHT-tickHeight-3);
        }
      }
      ctx.font = "italic 9px 'Segoe UI'";
      ctx.fillStyle = "#3c3c3c";
      const tilibra = "tilibra";
      const tw = ctx.measureText(tilibra).width;
      ctx.fillText(tilibra, w - tw - 12, rulerY+RULER_HEIGHT-8);
      ctx.font = "8px monospace";
      ctx.fillStyle = "#5a5a5a";
      ctx.fillText("mm", 6, rulerY+RULER_HEIGHT-6);
      ctx.fillStyle = "#222";
      ctx.fillText("cm", 6, rulerY+14);
      ctx.beginPath(); ctx.moveTo(0, rulerY+RULER_HEIGHT-2); ctx.lineTo(3, rulerY+RULER_HEIGHT-10);
      ctx.moveTo(w-1, rulerY+RULER_HEIGHT-2); ctx.lineTo(w-4, rulerY+RULER_HEIGHT-10); ctx.stroke();
    }

    function startDrawLoop() {
      if (animationId) cancelAnimationFrame(animationId);
      function frame() {
        if (videoElem.readyState >= 2) drawFrame();
        animationId = requestAnimationFrame(frame);
      }
      frame();
    }

    // --- Foto: captura e compartilha (salva no rolo) ---
    async function capturePhoto() {
      drawFrame();
      canvas.toBlob(async (blob) => {
        if (!blob) { showToast("Erro ao gerar imagem"); return; }
        const file = new File([blob], `camed_${Date.now()}.png`, { type: 'image/png' });
        // Tenta salvar via share (iOS/Android)
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ title: 'CamMed', files: [file] });
            showToast("✅ Foto salva no rolo");
            // Não faz nada, volta ao estado de captura
          } catch(e) {
            if (e.name !== 'AbortError') {
              // Se o usuário cancelou, não mostra erro
              console.warn("Share cancelado ou falhou:", e);
            }
            // Fallback para download
            downloadFallback(blob);
          }
        } else {
          downloadFallback(blob);
        }
        // Volta ao estado de prontidão (já está pronto)
      }, 'image/png');
    }

    function downloadFallback(blob) {
      const a = document.createElement('a');
      const url = URL.createObjectURL(blob);
      a.href = url;
      a.download = `camed_${Date.now()}.png`;
      a.click();
      URL.revokeObjectURL(url);
      showToast("📁 Imagem baixada (não foi possível salvar no rolo)");
    }

    // --- Vídeo: gravação com MediaRecorder (prioriza MP4) ---
    function getSupportedMimeType() {
      const types = ['video/mp4', 'video/webm', 'video/x-matroska'];
      for (let type of types) {
        if (MediaRecorder.isTypeSupported(type)) return type;
      }
      return null;
    }

    async function startRecording() {
      if (isRecording) return;
      try {
        drawFrame();
        canvasStream = canvas.captureStream(30);
        const mimeType = getSupportedMimeType();
        if (!mimeType) throw new Error("Nenhum codec suportado");
        mediaRecorder = new MediaRecorder(canvasStream, { mimeType: mimeType, videoBitsPerSecond: 2500000 });
        recordedChunks = [];
        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) recordedChunks.push(event.data);
        };
        mediaRecorder.onstop = () => {
          const blob = new Blob(recordedChunks, { type: mimeType });
          // Salvar o vídeo
          saveVideo(blob, mimeType);
          cleanupRecording();
          // Volta ao estado de prontidão
        };
        mediaRecorder.start(1000);
        isRecording = true;
        updateButtonUI();
        showToast("🔴 Gravando vídeo...");
      } catch (err) {
        console.error(err);
        showToast("Erro: " + err.message);
        cleanupRecording();
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      } else {
        cleanupRecording();
      }
    }

    function saveVideo(blob, mimeType) {
      const extension = mimeType.includes('mp4') ? 'mp4' : 'webm';
      const filename = `camed_video_${Date.now()}.${extension}`;
      const file = new File([blob], filename, { type: mimeType });
      
      // Tenta compartilhar (salvar no rolo via iOS/Android)
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ title: 'CamMed', files: [file] })
          .then(() => showToast("✅ Vídeo salvo no rolo"))
          .catch(err => {
            if (err.name !== 'AbortError') {
              console.warn("Share falhou:", err);
              // Fallback download
              downloadVideoFallback(blob, filename);
            }
          });
      } else {
        downloadVideoFallback(blob, filename);
      }
    }

    function downloadVideoFallback(blob, filename) {
      const a = document.createElement('a');
      const url = URL.createObjectURL(blob);
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
      showToast("📁 Vídeo baixado (não foi possível salvar no rolo)");
    }

    function cleanupRecording() {
      if (canvasStream) {
        canvasStream.getTracks().forEach(t => t.stop());
        canvasStream = null;
      }
      mediaRecorder = null;
      isRecording = false;
      updateButtonUI();
    }

    // --- Ação do botão central ---
    function onMainCapture() {
      if (currentMode === 'photo') {
        capturePhoto();
      } else {
        if (isRecording) {
          stopRecording();
        } else {
          startRecording();
        }
      }
    }

    // --- Alternar modo ---
    function setMode(mode) {
      currentMode = mode;
      const photoBtn = document.getElementById('photoModeBtn');
      const videoBtn = document.getElementById('videoModeBtn');
      const captureBtn = document.getElementById('captureBtn');
      const infoMsg = document.getElementById('infoMsg');
      if (mode === 'photo') {
        photoBtn.classList.add('active');
        videoBtn.classList.remove('active');
        captureBtn.classList.remove('video-mode');
        infoMsg.innerHTML = "📷 Modo Foto • Toque para capturar";
      } else {
        videoBtn.classList.add('active');
        photoBtn.classList.remove('active');
        captureBtn.classList.add('video-mode');
        infoMsg.innerHTML = "🎥 Modo Vídeo • Toque para iniciar/parar gravação";
      }
      if (isRecording && mode === 'photo') {
        stopRecording();
      }
      updateButtonUI();
    }

    function updateButtonUI() {
      const captureBtn = document.getElementById('captureBtn');
      if (currentMode === 'video' && isRecording) {
        captureBtn.classList.add('recording');
      } else {
        captureBtn.classList.remove('recording');
      }
    }

    // --- Instalação PWA ---
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const installBtn = document.getElementById('installBtn');
      installBtn.style.display = 'block';
      installBtn.onclick = async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') installBtn.style.display = 'none';
          deferredPrompt = null;
        }
      };
    });

    // --- Event Listeners ---
    document.getElementById('captureBtn').addEventListener('click', onMainCapture);
    document.getElementById('photoModeBtn').addEventListener('click', () => setMode('photo'));
    document.getElementById('videoModeBtn').addEventListener('click', () => setMode('video'));

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.opacity = '1';
      setTimeout(() => toast.style.opacity = '0', 2000);
    }

    // Inicializar
    initCamera();
    setMode('photo');
  })();
</script>
</body>
</html>
