<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CamMed - Grade Profissional</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #0a0f1e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      padding: 12px;
    }

    .app-container {
      background: #000;
      border-radius: 32px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
      overflow: hidden;
      max-width: 1000px;
      width: 100%;
      position: relative;
    }

    .canvas-wrapper {
      position: relative;
      line-height: 0;
      background: #1e1e2f;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      cursor: crosshair;
    }

    .control-bar {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 20px 24px;
    }

    .capture-btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: white;
      border: none;
      outline: none;
      cursor: pointer;
      box-shadow: 0 0 0 5px rgba(255,255,255,0.2), 0 0 0 8px rgba(0,255,180,0.3);
      transition: transform 0.1s ease, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: -20px;
    }
    .capture-btn:active {
      transform: scale(0.94);
    }
    .capture-btn .inner-dot {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #ff3366;
    }
    .capture-btn:active .inner-dot {
      background: #cc0044;
    }

    .info {
      color: #ddd;
      font-size: 0.7rem;
      text-align: center;
      padding: 8px;
      background: #00000088;
      border-radius: 12px;
      margin: 8px 12px;
    }
    footer {
      font-size: 0.7rem;
      text-align: center;
      color: #aaa;
      padding: 10px;
      background: #0a0a12;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="canvas-wrapper">
    <canvas id="mainCanvas" width="800" height="600"></canvas>
  </div>
  <div class="control-bar">
    <button class="capture-btn" id="captureBtn">
      <div class="inner-dot"></div>
    </button>
  </div>
  <div class="info">
    📷 Grade profissional (terços + foco + escala de exposição -3 a +3) + régua Tilibra
  </div>
  <footer>Toque no botão para capturar a tela com todas as sobreposições</footer>
</div>

<script>
  (function() {
    const video = document.createElement('video');
    video.setAttribute('autoplay', '');
    video.setAttribute('playsinline', '');
    video.style.display = 'none';
    document.body.appendChild(video);

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let animationId = null;

    // --- Régua fixa (estilo Tilibra) ---
    const PX_PER_CM = 30;        // 30px = 1cm virtual → 3px/mm
    const PX_PER_MM = PX_PER_CM / 10;
    const RULER_HEIGHT = 60;

    // --- Grade de enquadramento profissional ---
    const GRID_OPACITY = 0.65;
    const GRID_COLOR = `rgba(255, 255, 255, ${GRID_OPACITY})`;
    const LINE_WIDTH = 1.2;
    const FOCUS_CIRCLE_RADIUS = 60;   // círculo central de foco
    const SCALE_Y_POS = 40;           // posição vertical da escala de exposição (topo)
    const SCALE_VALUES = [-3, -2, -1, 0, 1, 2, 3];  // valores de exposição

    // --- Inicializar câmera (traseira prioritária) ---
    async function initCamera() {
      try {
        let constraints = {
          video: { facingMode: { exact: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }
        };
        let stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        await video.play();
        resizeCanvasToVideo();
        startDrawLoop();
        return true;
      } catch (err) {
        console.warn("Câmera traseira falhou, tentando qualquer câmera", err);
        try {
          let stream = await navigator.mediaDevices.getUserMedia({ video: true });
          video.srcObject = stream;
          await video.play();
          resizeCanvasToVideo();
          startDrawLoop();
          return true;
        } catch(e) {
          console.error("Erro fatal na câmera", e);
          document.querySelector('.info').innerHTML = "❌ Sem acesso à câmera. Verifique permissões.";
          return false;
        }
      }
    }

    function resizeCanvasToVideo() {
      if (!video.videoWidth) return;
      const container = canvas.parentElement;
      const maxWidth = container.clientWidth;
      const videoRatio = video.videoWidth / video.videoHeight;
      let canvasWidth = maxWidth;
      let canvasHeight = canvasWidth / videoRatio;
      if (canvasHeight > window.innerHeight * 0.7) {
        canvasHeight = window.innerHeight * 0.7;
        canvasWidth = canvasHeight * videoRatio;
      }
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;
    }

    window.addEventListener('resize', () => {
      if (video.videoWidth) resizeCanvasToVideo();
    });

    // --- Desenho principal (vídeo + grade + régua) ---
    function drawFrame() {
      if (!video.videoWidth || !canvas.width) return;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      drawProfessionalGrid();   // grade de terços + círculo + escala
      drawRuler();              // régua transparente estilo Tilibra
    }

    // Grade profissional inspirada em visor de câmera moderna
    function drawProfessionalGrid() {
      const w = canvas.width;
      const h = canvas.height;
      ctx.save();
      ctx.strokeStyle = GRID_COLOR;
      ctx.lineWidth = LINE_WIDTH;
      ctx.fillStyle = `rgba(255, 255, 255, 0.4)`;

      // 1. Linhas da regra dos terços
      const x1 = w / 3;
      const x2 = 2 * w / 3;
      const y1 = h / 3;
      const y2 = 2 * h / 3;

      ctx.beginPath();
      ctx.moveTo(x1, 0);
      ctx.lineTo(x1, h);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x2, 0);
      ctx.lineTo(x2, h);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, y1);
      ctx.lineTo(w, y1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, y2);
      ctx.lineTo(w, y2);
      ctx.stroke();

      // 2. Círculo central de foco (como visor)
      const centerX = w / 2;
      const centerY = h / 2;
      ctx.beginPath();
      ctx.arc(centerX, centerY, FOCUS_CIRCLE_RADIUS, 0, 2 * Math.PI);
      ctx.stroke();
      // Pequena mira no centro
      ctx.beginPath();
      ctx.moveTo(centerX - 8, centerY);
      ctx.lineTo(centerX + 8, centerY);
      ctx.moveTo(centerX, centerY - 8);
      ctx.lineTo(centerX, centerY + 8);
      ctx.stroke();
      // Círculo interno
      ctx.beginPath();
      ctx.arc(centerX, centerY, FOCUS_CIRCLE_RADIUS * 0.4, 0, 2 * Math.PI);
      ctx.stroke();

      // 3. Escala de exposição (-3 a +3) no topo central
      const scaleWidth = 180;      // largura total da escala
      const startX = (w / 2) - (scaleWidth / 2);
      const scaleY = SCALE_Y_POS;
      const tickSpacing = scaleWidth / (SCALE_VALUES.length - 1);
      
      // Linha horizontal da escala
      ctx.beginPath();
      ctx.moveTo(startX, scaleY);
      ctx.lineTo(startX + scaleWidth, scaleY);
      ctx.stroke();
      
      // Marcas e números
      ctx.font = "12px 'Courier New', monospace";
      ctx.fillStyle = GRID_COLOR;
      ctx.textAlign = "center";
      for (let i = 0; i < SCALE_VALUES.length; i++) {
        const xTick = startX + i * tickSpacing;
        ctx.beginPath();
        ctx.moveTo(xTick, scaleY - 5);
        ctx.lineTo(xTick, scaleY + 5);
        ctx.stroke();
        let label = SCALE_VALUES[i];
        if (label > 0) label = "+" + label;
        ctx.fillText(label.toString(), xTick, scaleY - 8);
      }
      // Indicador central (triângulo ou linha destacada)
      ctx.beginPath();
      ctx.moveTo(w/2, scaleY - 10);
      ctx.lineTo(w/2 - 4, scaleY - 2);
      ctx.lineTo(w/2 + 4, scaleY - 2);
      ctx.fillStyle = `rgba(255, 200, 100, 0.9)`;
      ctx.fill();

      // 4. Pequenos retângulos de foco nos pontos de terço (opcional)
      const corners = [[x1, y1], [x1, y2], [x2, y1], [x2, y2]];
      corners.forEach(([cx, cy]) => {
        ctx.beginPath();
        ctx.rect(cx - 12, cy - 8, 24, 16);
        ctx.stroke();
        ctx.beginPath();
        ctx.rect(cx - 8, cy - 12, 16, 24);
        ctx.stroke();
      });

      ctx.restore();
    }

    // Régua transparente estilo Tilibra (igual à anterior, mas mantendo estilo)
    function drawRuler() {
      const w = canvas.width;
      const rulerY = canvas.height - RULER_HEIGHT;
      
      ctx.fillStyle = "rgba(255, 248, 225, 0.85)";
      ctx.fillRect(0, rulerY, w, RULER_HEIGHT);
      ctx.strokeStyle = "#aaa";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, rulerY);
      ctx.lineTo(w, rulerY);
      ctx.stroke();

      const totalMM = Math.floor(w / PX_PER_MM);
      ctx.fillStyle = "#222";
      ctx.font = "11px 'Courier New', monospace";
      ctx.strokeStyle = "#222";
      ctx.lineWidth = 1;

      for (let mm = 0; mm <= totalMM; mm++) {
        const x = mm * PX_PER_MM;
        if (x > w) break;
        const isCm = (mm % 10 === 0);
        const is5mm = (mm % 5 === 0 && !isCm);
        let tickHeight = 8;
        if (is5mm) tickHeight = 14;
        if (isCm) tickHeight = 22;

        ctx.beginPath();
        ctx.moveTo(x, rulerY + RULER_HEIGHT - 2);
        ctx.lineTo(x, rulerY + RULER_HEIGHT - tickHeight);
        ctx.stroke();

        if (isCm) {
          const cmValue = mm / 10;
          let label = "";
          if (cmValue === 0) label = "0";
          else if (cmValue === 1) label = "1cm";
          else label = cmValue.toString();
          ctx.fillStyle = "#111";
          ctx.font = "bold 11px 'Segoe UI', monospace";
          const textW = ctx.measureText(label).width;
          let textX = x - textW/2;
          if (textX < 2) textX = 2;
          if (textX + textW > w - 5) textX = w - textW - 2;
          ctx.fillText(label, textX, rulerY + RULER_HEIGHT - tickHeight - 3);
        }
      }

      ctx.font = "italic 9px 'Segoe UI'";
      ctx.fillStyle = "#3c3c3c";
      const tilibra = "tilibra";
      const tw = ctx.measureText(tilibra).width;
      ctx.fillText(tilibra, w - tw - 12, rulerY + RULER_HEIGHT - 8);
      ctx.font = "8px monospace";
      ctx.fillStyle = "#5a5a5a";
      ctx.fillText("mm", 6, rulerY + RULER_HEIGHT - 6);
      ctx.fillStyle = "#222";
      ctx.fillText("cm", 6, rulerY + 14);
      
      ctx.beginPath();
      ctx.moveTo(0, rulerY + RULER_HEIGHT-2);
      ctx.lineTo(3, rulerY + RULER_HEIGHT-10);
      ctx.moveTo(w-1, rulerY + RULER_HEIGHT-2);
      ctx.lineTo(w-4, rulerY + RULER_HEIGHT-10);
      ctx.stroke();
    }

    function startDrawLoop() {
      if (animationId) cancelAnimationFrame(animationId);
      function frame() {
        if (video.readyState >= 2) drawFrame();
        animationId = requestAnimationFrame(frame);
      }
      frame();
    }

    function captureImage() {
      drawFrame();
      const link = document.createElement('a');
      const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
      link.download = `camed_grid_${timestamp}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    document.getElementById('captureBtn').addEventListener('click', captureImage);
    initCamera();
  })();
</script>
</body>
</html>
