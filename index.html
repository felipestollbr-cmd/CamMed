<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CamMed - Grade Fotográfica</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #0a0f1e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      padding: 12px;
    }

    .app-container {
      background: #000;
      border-radius: 32px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
      overflow: hidden;
      max-width: 1000px;
      width: 100%;
      position: relative;
    }

    .canvas-wrapper {
      position: relative;
      line-height: 0;
      background: #1e1e2f;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      cursor: crosshair;
    }

    /* Botão de captura centralizado e mais alto */
    .control-bar {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 20px 24px;
    }

    .capture-btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: white;
      border: none;
      outline: none;
      cursor: pointer;
      box-shadow: 0 0 0 5px rgba(255,255,255,0.2), 0 0 0 8px rgba(0,255,180,0.3);
      transition: transform 0.1s ease, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: -20px;  /* eleva o botão */
    }
    .capture-btn:active {
      transform: scale(0.94);
    }
    .capture-btn .inner-dot {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #ff3366;
    }
    .capture-btn:active .inner-dot {
      background: #cc0044;
    }

    .info {
      color: #ddd;
      font-size: 0.7rem;
      text-align: center;
      padding: 8px;
      background: #00000088;
      border-radius: 12px;
      margin: 8px 12px;
    }
    footer {
      font-size: 0.7rem;
      text-align: center;
      color: #aaa;
      padding: 10px;
      background: #0a0a12;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="canvas-wrapper">
    <canvas id="mainCanvas" width="800" height="600"></canvas>
  </div>
  <div class="control-bar">
    <button class="capture-btn" id="captureBtn">
      <div class="inner-dot"></div>
    </button>
  </div>
  <div class="info">
    📷 Grade de enquadramento (regra dos terços) + régua fixa | Botão centralizado
  </div>
  <footer>Régua estilo Tilibra | Toque para capturar com grade e régua</footer>
</div>

<script>
  (function() {
    // ----- ELEMENTOS -----
    const video = document.createElement('video');
    video.setAttribute('autoplay', '');
    video.setAttribute('playsinline', '');
    video.style.display = 'none';
    document.body.appendChild(video);

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    let animationId = null;

    // ----- CONFIGURAÇÕES DA RÉGUA FIXA (transparente, estilo Tilibra) -----
    const PX_PER_CM = 30;        // 30px = 1cm virtual → 3px = 1mm
    const PX_PER_MM = PX_PER_CM / 10;
    const RULER_HEIGHT = 60;

    // ----- CONFIGURAÇÕES DA GRADE DE ENQUADRAMENTO (Regra dos Terços) -----
    const GRID_COLOR = "rgba(255, 255, 255, 0.65)";
    const GRID_LINE_WIDTH = 1.5;
    const CENTER_DOT_SIZE = 4;   // ponto central opcional

    // ----- INICIALIZAR CÂMERA (traseira preferencial) -----
    async function initCamera() {
      try {
        let constraints = {
          video: { facingMode: { exact: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }
        };
        let stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        await video.play();
        resizeCanvasToVideo();
        startDrawLoop();
        return true;
      } catch (err) {
        console.warn("Câmera traseira falhou, tentando qualquer câmera", err);
        try {
          let stream = await navigator.mediaDevices.getUserMedia({ video: true });
          video.srcObject = stream;
          await video.play();
          resizeCanvasToVideo();
          startDrawLoop();
          return true;
        } catch(e) {
          console.error("Erro fatal na câmera", e);
          document.querySelector('.info').innerHTML = "❌ Sem acesso à câmera. Verifique permissões.";
          return false;
        }
      }
    }

    function resizeCanvasToVideo() {
      if (!video.videoWidth) return;
      const container = canvas.parentElement;
      const maxWidth = container.clientWidth;
      const videoRatio = video.videoWidth / video.videoHeight;
      let canvasWidth = maxWidth;
      let canvasHeight = canvasWidth / videoRatio;
      if (canvasHeight > window.innerHeight * 0.7) {
        canvasHeight = window.innerHeight * 0.7;
        canvasWidth = canvasHeight * videoRatio;
      }
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;
    }

    window.addEventListener('resize', () => {
      if (video.videoWidth) resizeCanvasToVideo();
    });

    // ----- LOOP DE DESENHO (vídeo + grade + régua) -----
    function drawFrame() {
      if (!video.videoWidth || !canvas.width) return;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      drawPhotographyGrid();   // grade de terços
      drawRuler();             // régua transparente inferior
    }

    // Grade de enquadramento fotográfico (regra dos terços)
    function drawPhotographyGrid() {
      const w = canvas.width;
      const h = canvas.height;
      ctx.save();
      ctx.beginPath();
      ctx.strokeStyle = GRID_COLOR;
      ctx.lineWidth = GRID_LINE_WIDTH;
      
      // Linhas verticais a 1/3 e 2/3 da largura
      const x1 = w / 3;
      const x2 = 2 * w / 3;
      ctx.beginPath();
      ctx.moveTo(x1, 0);
      ctx.lineTo(x1, h);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x2, 0);
      ctx.lineTo(x2, h);
      ctx.stroke();
      
      // Linhas horizontais a 1/3 e 2/3 da altura
      const y1 = h / 3;
      const y2 = 2 * h / 3;
      ctx.beginPath();
      ctx.moveTo(0, y1);
      ctx.lineTo(w, y1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, y2);
      ctx.lineTo(w, y2);
      ctx.stroke();
      
      // (Opcional) ponto central para ajudar no alinhamento
      ctx.beginPath();
      ctx.arc(w/2, h/2, CENTER_DOT_SIZE, 0, 2 * Math.PI);
      ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
      ctx.fill();
      
      ctx.restore();
    }

    // Régua transparente estilo Tilibra (marcações mm, 5mm, cm)
    function drawRuler() {
      const w = canvas.width;
      const rulerY = canvas.height - RULER_HEIGHT;
      
      // Fundo semi-transparente claro (régua "translúcida")
      ctx.fillStyle = "rgba(255, 248, 225, 0.85)";
      ctx.fillRect(0, rulerY, w, RULER_HEIGHT);
      ctx.strokeStyle = "#aaa";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, rulerY);
      ctx.lineTo(w, rulerY);
      ctx.stroke();

      const totalMM = Math.floor(w / PX_PER_MM);
      ctx.fillStyle = "#222";
      ctx.font = "11px 'Courier New', monospace";
      ctx.strokeStyle = "#222";
      ctx.lineWidth = 1;

      for (let mm = 0; mm <= totalMM; mm++) {
        const x = mm * PX_PER_MM;
        if (x > w) break;
        const isCm = (mm % 10 === 0);
        const is5mm = (mm % 5 === 0 && !isCm);
        let tickHeight = 8;   // 1mm
        if (is5mm) tickHeight = 14;
        if (isCm) tickHeight = 22;

        ctx.beginPath();
        ctx.moveTo(x, rulerY + RULER_HEIGHT - 2);
        ctx.lineTo(x, rulerY + RULER_HEIGHT - tickHeight);
        ctx.stroke();

        if (isCm) {
          const cmValue = mm / 10;
          let label = "";
          if (cmValue === 0) label = "0";
          else if (cmValue === 1) label = "1cm";
          else label = cmValue.toString();
          ctx.fillStyle = "#111";
          ctx.font = "bold 11px 'Segoe UI', monospace";
          const textW = ctx.measureText(label).width;
          let textX = x - textW/2;
          if (textX < 2) textX = 2;
          if (textX + textW > w - 5) textX = w - textW - 2;
          ctx.fillText(label, textX, rulerY + RULER_HEIGHT - tickHeight - 3);
        }
      }

      // Texto "tilibra" e pequenos ícones
      ctx.font = "italic 9px 'Segoe UI'";
      ctx.fillStyle = "#3c3c3c";
      const tilibra = "tilibra";
      const tw = ctx.measureText(tilibra).width;
      ctx.fillText(tilibra, w - tw - 12, rulerY + RULER_HEIGHT - 8);
      ctx.font = "8px monospace";
      ctx.fillStyle = "#5a5a5a";
      ctx.fillText("mm", 6, rulerY + RULER_HEIGHT - 6);
      ctx.fillStyle = "#222";
      ctx.fillText("cm", 6, rulerY + 14);
      
      // extremidades
      ctx.beginPath();
      ctx.moveTo(0, rulerY + RULER_HEIGHT-2);
      ctx.lineTo(3, rulerY + RULER_HEIGHT-10);
      ctx.moveTo(w-1, rulerY + RULER_HEIGHT-2);
      ctx.lineTo(w-4, rulerY + RULER_HEIGHT-10);
      ctx.stroke();
    }

    function startDrawLoop() {
      if (animationId) cancelAnimationFrame(animationId);
      function frame() {
        if (video.readyState >= 2) drawFrame();
        animationId = requestAnimationFrame(frame);
      }
      frame();
    }

    // ----- CAPTURA DA IMAGEM (com grade e régua) -----
    function captureImage() {
      drawFrame(); // garante desenho atualizado
      const link = document.createElement('a');
      const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
      link.download = `camed_photo_${timestamp}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // ----- EVENTOS -----
    document.getElementById('captureBtn').addEventListener('click', captureImage);

    // Inicializar
    initCamera();
  })();
</script>
</body>
</html>
