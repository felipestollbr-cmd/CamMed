<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CamRégua">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>CamRégua</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:manipulation;user-select:none;-webkit-user-select:none}
#app{position:fixed;inset:0;background:#000}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#gridCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
#captureCanvas{display:none}

/* TOPO */
#topBar{
  position:absolute;top:0;left:0;right:0;
  height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;padding-top:env(safe-area-inset-top,0px);
  background:linear-gradient(to bottom,rgba(0,0,0,.72),transparent);
  z-index:20;
}
.app-title{font-family:'Share Tech Mono',monospace;font-size:14px;color:#00ffb4;letter-spacing:3px}
.top-controls{display:flex;gap:10px}
.icon-btn{
  background:rgba(0,0,0,.6);border:1.5px solid rgba(0,255,180,.35);color:#00ffb4;
  border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;-webkit-tap-highlight-color:transparent;transition:background .15s
}
.icon-btn.active{border-color:#00ffb4;background:rgba(0,255,180,.18)}
.icon-btn:active{background:rgba(0,255,180,.28)}

/* INFERIOR: régua + botão */
#bottomBar{
  position:absolute;bottom:0;left:0;right:0;
  z-index:20;
  padding-bottom:env(safe-area-inset-bottom,0px);
}

/* Régua */
#ruler{
  width:100%;height:64px;
  background:rgba(6,6,6,.94);
  border-top:1.5px solid rgba(0,255,180,.28);
  position:relative;overflow:hidden;
}
#rulerCanvas{position:absolute;top:0;left:0;width:100%;height:100%}

/* Faixa do botão — centraliza o botão */
#controls{
  display:flex;align-items:center;justify-content:center;
  padding:12px 0 10px;
  background:rgba(0,0,0,.82);
  position:relative;
}

/* Thumb — posicionado à esquerda do centro */
#previewThumb{
  position:absolute;left:40px;
  width:52px;height:52px;border-radius:8px;
  border:2px solid #00ffb4;object-fit:cover;cursor:pointer;
  -webkit-tap-highlight-color:transparent;visibility:hidden;
}

/* Botão de captura — centralizado */
#captureBtn{
  width:76px;height:76px;border-radius:50%;
  background:#fff;border:4px solid #00ffb4;
  outline:none;cursor:pointer;
  box-shadow:0 0 0 5px rgba(0,255,180,.2),0 0 20px rgba(0,255,180,.25);
  -webkit-tap-highlight-color:transparent;
  flex-shrink:0;transition:transform .1s;
}
#captureBtn:active{transform:scale(.9)}

/* Flash */
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:99;transition:opacity .06s}
#flash.on{opacity:.88}

/* Lightbox */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:18px}
#lightbox.open{display:flex}
#lbImg{max-width:92vw;max-height:68vh;border-radius:8px;border:1px solid rgba(0,255,180,.3);object-fit:contain}
.lb-actions{display:flex;gap:14px}
.lb-btn{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:1.5px;padding:11px 24px;border-radius:6px;cursor:pointer;border:1.5px solid #00ffb4;background:transparent;color:#00ffb4;-webkit-tap-highlight-color:transparent}
.lb-btn.primary{background:#00ffb4;color:#000;font-weight:700}

/* Toast */
#toast{position:fixed;bottom:145px;left:50%;transform:translateX(-50%) translateY(14px);background:rgba(0,255,180,.13);border:1px solid #00ffb4;color:#00ffb4;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1.5px;padding:8px 20px;border-radius:20px;opacity:0;transition:opacity .28s,transform .28s;pointer-events:none;z-index:300;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Splash */
#splash{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;z-index:500;transition:opacity .5s}
#splash.gone{opacity:0;pointer-events:none}
.spl-title{font-family:'Share Tech Mono',monospace;color:#00ffb4;font-size:26px;letter-spacing:6px}
.spl-sub{color:rgba(255,255,255,.35);font-size:12px;letter-spacing:2px;font-family:sans-serif}
.spl-bar{width:50px;height:2px;background:rgba(0,255,180,.18);border-radius:2px;overflow:hidden;position:relative}
.spl-bar::after{content:'';position:absolute;left:-50%;width:50%;height:100%;background:#00ffb4;animation:sbar .9s infinite ease-in-out}
@keyframes sbar{0%{left:-50%}100%{left:150%}}

/* Erro */
#errMsg{position:fixed;inset:0;background:#000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:rgba(255,255,255,.5);font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:1px;text-align:center;padding:30px;z-index:400}
#errMsg.show{display:flex}
#errMsg span{font-size:44px}
</style>
</head>
<body>
<div id="splash">
  <div class="spl-title">CAMRÉGUA</div>
  <div class="spl-sub">câmera · grade · régua</div>
  <div class="spl-bar"></div>
</div>
<div id="errMsg"><span>📷</span><p>Sem acesso à câmera.<br>Verifique as permissões.</p></div>
<div id="flash"></div>
<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="gridCanvas"></canvas>
  <canvas id="captureCanvas"></canvas>
  <div id="topBar">
    <div class="app-title">CAMRÉGUA</div>
    <div class="top-controls">
      <div class="icon-btn active" id="gridToggle">⊞</div>
      <div class="icon-btn" id="flipBtn">🔄</div>
    </div>
  </div>
  <div id="bottomBar">
    <div id="ruler"><canvas id="rulerCanvas"></canvas></div>
    <div id="controls">
      <img id="previewThumb" alt="última foto"/>
      <button id="captureBtn" aria-label="Tirar foto"></button>
    </div>
  </div>
</div>
<div id="lightbox">
  <img id="lbImg" src="" alt="foto"/>
  <div class="lb-actions">
    <button class="lb-btn" id="lbClose">FECHAR</button>
    <button class="lb-btn primary" id="lbSave">⬇ SALVAR NA GALERIA</button>
  </div>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════
const S = {
  stream: null,
  facing: 'environment',
  showGrid: true,
  lastPhoto: null,
  dpr: Math.min(window.devicePixelRatio || 1, 3),
  mmPerPx: 0,   // mm por CSS pixel — calibrado abaixo
};

// Elementos
const video        = document.getElementById('video');
const gridCanvas   = document.getElementById('gridCanvas');
const captureCanvas= document.getElementById('captureCanvas');
const rulerCanvas  = document.getElementById('rulerCanvas');
const gCtx         = gridCanvas.getContext('2d');
const cCtx         = captureCanvas.getContext('2d');
const rCtx         = rulerCanvas.getContext('2d');
const captureBtn   = document.getElementById('captureBtn');
const flipBtn      = document.getElementById('flipBtn');
const gridToggle   = document.getElementById('gridToggle');
const previewThumb = document.getElementById('previewThumb');
const flash        = document.getElementById('flash');
const lightbox     = document.getElementById('lightbox');
const lbImg        = document.getElementById('lbImg');
const lbClose      = document.getElementById('lbClose');
const lbSave       = document.getElementById('lbSave');
const ruler        = document.getElementById('ruler');
const errMsg       = document.getElementById('errMsg');
const splash       = document.getElementById('splash');

// ═══════════════════════════════════════
// CALIBRAÇÃO DPI REAL
// Usa matchMedia resolution para detectar
// o DPI físico real da tela do dispositivo
// ═══════════════════════════════════════
function calibrateDPI() {
  // Testa do maior para o menor — pega o primeiro que bate
  const probes = [600,560,520,480,440,400,360,320,294,288,264,240,218,216,
                  192,168,163,160,144,132,120,110,96,72];
  let dpi = 96;
  for (const d of probes) {
    if (window.matchMedia(`(min-resolution: ${d}dpi)`).matches) {
      dpi = d;
      break;
    }
  }
  // mm por CSS pixel = 25.4mm / dpi
  S.mmPerPx = 25.4 / dpi;
  console.log(`DPI detectado: ${dpi} | mmPerPx: ${S.mmPerPx.toFixed(5)}`);
}

// ═══════════════════════════════════════
// CÂMERA
// ═══════════════════════════════════════
async function startCamera() {
  if (S.stream) S.stream.getTracks().forEach(t => t.stop());
  try {
    S.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: S.facing, width:{ideal:1920}, height:{ideal:1080} },
      audio: false
    });
    video.srcObject = S.stream;
    await video.play();
    hideSplash();
  } catch(e) {
    console.error(e);
    hideSplash();
    errMsg.classList.add('show');
  }
}

function hideSplash() {
  const sp = document.getElementById('splash');
  sp.classList.add('gone');
  setTimeout(() => sp.style.display = 'none', 600);
}

// ═══════════════════════════════════════
// RESIZE — recalcula ao girar/redimensionar
// ═══════════════════════════════════════
function resize() {
  const W   = window.innerWidth;
  const H   = window.innerHeight;
  const dpr = S.dpr;

  gridCanvas.width  = W * dpr;
  gridCanvas.height = H * dpr;
  gridCanvas.style.width  = W + 'px';
  gridCanvas.style.height = H + 'px';

  const rw = ruler.offsetWidth  || W;
  const rh = ruler.offsetHeight || 64;
  rulerCanvas.width  = rw * dpr;
  rulerCanvas.height = rh * dpr;
  rulerCanvas.style.width  = rw + 'px';
  rulerCanvas.style.height = rh + 'px';

  drawGrid();
  drawRuler();
}

// ═══════════════════════════════════════
// GRADE (regra dos terços)
// ═══════════════════════════════════════
function drawGrid() {
  const W = gridCanvas.width;
  const H = gridCanvas.height;
  const dpr = S.dpr;
  gCtx.clearRect(0, 0, W, H);
  if (!S.showGrid) return;

  gCtx.save();

  // Linhas dos terços
  gCtx.strokeStyle = 'rgba(0,255,180,0.42)';
  gCtx.lineWidth   = 1.2 * dpr;
  for (let i = 1; i <= 2; i++) {
    gCtx.beginPath(); gCtx.moveTo(W/3*i, 0);   gCtx.lineTo(W/3*i, H);   gCtx.stroke();
    gCtx.beginPath(); gCtx.moveTo(0,     H/3*i); gCtx.lineTo(W,     H/3*i); gCtx.stroke();
  }

  // Pontos de intersecção
  gCtx.fillStyle = 'rgba(0,255,180,0.85)';
  for (const [px,py] of [[W/3,H/3],[2*W/3,H/3],[W/3,2*H/3],[2*W/3,2*H/3]]) {
    gCtx.beginPath(); gCtx.arc(px, py, 4*dpr, 0, Math.PI*2); gCtx.fill();
  }

  // Cruz central
  const cs = 18 * dpr;
  gCtx.strokeStyle = 'rgba(0,255,180,0.72)';
  gCtx.lineWidth   = 1.5 * dpr;
  gCtx.beginPath();
  gCtx.moveTo(W/2-cs, H/2); gCtx.lineTo(W/2+cs, H/2);
  gCtx.moveTo(W/2, H/2-cs); gCtx.lineTo(W/2, H/2+cs);
  gCtx.stroke();

  gCtx.restore();
}

// ═══════════════════════════════════════
// RÉGUA — mm/cm reais como numa régua física
//
// Layout igual à régua TR-10 da imagem:
//  - linha de base no TOPO
//  - traços descem para baixo
//  - traço cm   = 70% da altura
//  - traço 5mm  = 45% da altura
//  - traço 1mm  = 25% da altura
//  - número do cm fica ABAIXO do traço, junto à base
// ═══════════════════════════════════════
function drawRuler() {
  const W   = rulerCanvas.width;
  const H   = rulerCanvas.height;
  const dpr = S.dpr;

  rCtx.clearRect(0, 0, W, H);

  // pixels de canvas por mm
  const pxPerMm = (1 / S.mmPerPx) * dpr;   // CSS_px_per_mm * dpr
  const totalMm = Math.ceil(W / pxPerMm) + 2;

  const baseY  = 1.5 * dpr;               // linha de base (topo)
  const tCm    = H * 0.68;                // altura traço cm
  const tHalf  = H * 0.44;                // altura traço 5mm
  const tMm    = H * 0.24;                // altura traço 1mm

  rCtx.save();
  rCtx.strokeStyle = '#00ffb4';
  rCtx.fillStyle   = '#00ffb4';
  rCtx.lineWidth   = 1 * dpr;

  // Linha base horizontal
  rCtx.beginPath();
  rCtx.moveTo(0, baseY);
  rCtx.lineTo(W, baseY);
  rCtx.stroke();

  // Fonte
  const fs = Math.round(Math.max(8, 9) * dpr);
  rCtx.font      = `${fs}px 'Share Tech Mono', monospace`;
  rCtx.textAlign = 'center';

  for (let mm = 0; mm <= totalMm; mm++) {
    const x = mm * pxPerMm;
    if (x > W + 1) break;

    let tH;
    if (mm % 10 === 0) {
      tH = tCm;
      // Número do centímetro na parte baixa (como na régua real)
      rCtx.fillText(String(mm / 10), x, H - 2 * dpr);
    } else if (mm % 5 === 0) {
      tH = tHalf;
    } else {
      tH = tMm;
    }

    rCtx.beginPath();
    rCtx.moveTo(x, baseY);
    rCtx.lineTo(x, baseY + tH);
    rCtx.stroke();
  }

  rCtx.restore();
}

// ═══════════════════════════════════════
// CAPTURA — grava grade + régua na foto
// ═══════════════════════════════════════
async function capturePhoto() {
  const vw = video.videoWidth  || window.innerWidth;
  const vh = video.videoHeight || window.innerHeight;

  const scaleW = vw / window.innerWidth;
  const scaleH = vh / window.innerHeight;

  const rulerCssH  = ruler.offsetHeight;
  const rulerVidH  = rulerCssH * scaleH;

  captureCanvas.width  = vw;
  captureCanvas.height = vh;

  // Frame da câmera
  cCtx.drawImage(video, 0, 0, vw, vh);

  // Grade
  if (S.showGrid) {
    cCtx.save();
    cCtx.strokeStyle = 'rgba(0,255,180,0.48)';
    cCtx.lineWidth   = Math.max(1, 1.5 * scaleW);
    for (let i = 1; i <= 2; i++) {
      cCtx.beginPath(); cCtx.moveTo(vw/3*i,0);  cCtx.lineTo(vw/3*i,vh);  cCtx.stroke();
      cCtx.beginPath(); cCtx.moveTo(0,vh/3*i);  cCtx.lineTo(vw,vh/3*i);  cCtx.stroke();
    }
    cCtx.fillStyle = 'rgba(0,255,180,0.85)';
    for (const [px,py] of [[vw/3,vh/3],[2*vw/3,vh/3],[vw/3,2*vh/3],[2*vw/3,2*vh/3]]) {
      cCtx.beginPath(); cCtx.arc(px,py,5*scaleW,0,Math.PI*2); cCtx.fill();
    }
    const cs = 20*scaleW;
    cCtx.strokeStyle = 'rgba(0,255,180,0.72)';
    cCtx.beginPath();
    cCtx.moveTo(vw/2-cs,vh/2); cCtx.lineTo(vw/2+cs,vh/2);
    cCtx.moveTo(vw/2,vh/2-cs); cCtx.lineTo(vw/2,vh/2+cs);
    cCtx.stroke();
    cCtx.restore();
  }

  // Régua
  drawRulerOnCapture(cCtx, vw, vh, rulerVidH, scaleW, scaleH);

  return captureCanvas.toDataURL('image/jpeg', 0.95);
}

function drawRulerOnCapture(ctx, vw, vh, rulerH, scaleW, scaleH) {
  ctx.save();

  // Fundo
  ctx.fillStyle = 'rgba(6,6,6,0.94)';
  ctx.fillRect(0, vh - rulerH, vw, rulerH);

  // Borda topo
  ctx.strokeStyle = 'rgba(0,255,180,0.28)';
  ctx.lineWidth   = scaleH;
  ctx.beginPath(); ctx.moveTo(0,vh-rulerH); ctx.lineTo(vw,vh-rulerH); ctx.stroke();

  // Escala — usa mesma calibração mm->px ajustada pela escala do vídeo
  const pxPerMm  = (1 / S.mmPerPx) * scaleW;
  const totalMm  = Math.ceil(vw / pxPerMm) + 2;
  const baseY    = vh - rulerH + scaleH;
  const tCm      = rulerH * 0.68;
  const tHalf    = rulerH * 0.44;
  const tMm      = rulerH * 0.24;
  const fs       = Math.round(Math.max(8, 9 * scaleW));

  ctx.strokeStyle = '#00ffb4';
  ctx.fillStyle   = '#00ffb4';
  ctx.lineWidth   = Math.max(1, scaleW);
  ctx.font        = `${fs}px monospace`;
  ctx.textAlign   = 'center';

  ctx.beginPath(); ctx.moveTo(0,baseY); ctx.lineTo(vw,baseY); ctx.stroke();

  for (let mm = 0; mm <= totalMm; mm++) {
    const x = mm * pxPerMm;
    if (x > vw + 1) break;
    let tH;
    if (mm % 10 === 0) {
      tH = tCm;
      ctx.fillText(String(mm/10), x, vh - 2*scaleH);
    } else if (mm % 5 === 0) {
      tH = tHalf;
    } else {
      tH = tMm;
    }
    ctx.beginPath(); ctx.moveTo(x,baseY); ctx.lineTo(x,baseY+tH); ctx.stroke();
  }

  ctx.restore();
}

// ═══════════════════════════════════════
// SALVAR NA GALERIA
//
// iOS Safari / Chrome Android:
//   Web Share API com arquivo de imagem
//   → sistema salva direto na galeria de fotos
//
// Fallback (desktop/browsers sem share):
//   <a download> dispara o download
// ═══════════════════════════════════════
async function saveToGallery(dataUrl) {
  const filename = `camregua_${Date.now()}.jpg`;

  // Converte dataUrl → Blob → File
  const res  = await fetch(dataUrl);
  const blob = await res.blob();
  const file = new File([blob], filename, { type: 'image/jpeg' });

  // Web Share API — único jeito real de salvar na galeria via PWA
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        files: [file],
        title: 'CamRégua',
      });
      showToast('✓ SALVO NA GALERIA');
      return;
    } catch(e) {
      if (e.name !== 'AbortError') console.warn(e);
      // usuário cancelou ou erro — tenta fallback
    }
  }

  // Fallback: link de download (salva em Downloads, não na galeria)
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast('⬇ FOTO BAIXADA');
}

// ═══════════════════════════════════════
// CAPTURA — evento do botão
// ═══════════════════════════════════════
let capturing = false;

function doCapture(e) {
  e.preventDefault();
  e.stopPropagation();
  if (capturing) return;
  capturing = true;

  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 130);

  capturePhoto().then(async dataUrl => {
    S.lastPhoto = dataUrl;
    previewThumb.src = dataUrl;
    previewThumb.style.visibility = 'visible';

    // Salva automaticamente na galeria ao capturar
    await saveToGallery(dataUrl);
  }).catch(err => {
    console.error(err);
    showToast('Erro ao capturar');
  }).finally(() => {
    capturing = false;
  });
}

captureBtn.addEventListener('touchend', doCapture, { passive: false });
captureBtn.addEventListener('click',    doCapture);

// ═══════════════════════════════════════
// OUTROS EVENTOS
// ═══════════════════════════════════════
flipBtn.addEventListener('click', () => {
  S.facing = S.facing === 'environment' ? 'user' : 'environment';
  startCamera();
});

gridToggle.addEventListener('click', () => {
  S.showGrid = !S.showGrid;
  gridToggle.classList.toggle('active', S.showGrid);
  drawGrid();
});

previewThumb.addEventListener('click', () => {
  if (!S.lastPhoto) return;
  lbImg.src = S.lastPhoto;
  lightbox.classList.add('open');
});

lbClose.addEventListener('click', () => lightbox.classList.remove('open'));
lbSave.addEventListener('click',  () => S.lastPhoto && saveToGallery(S.lastPhoto));

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let _tt;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════
// LOOP DE GRADE
// ═══════════════════════════════════════
function loop() { drawGrid(); requestAnimationFrame(loop); }

// ═══════════════════════════════════════
// ORIENTAÇÃO
// ═══════════════════════════════════════
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 380));

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
calibrateDPI();
resize();
startCamera();
loop();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(console.warn));
}
</script>
</body>
</html>
